# Netlify deploy for the Donde Ayudar DESIGN MOCKUP (Claude Design handoff bundle).
# Static files only — no build step. Entry is index.html -> "Donde Ayudar.dc.html".
#
# NOTE: this publishes the prototype, not the Astro site. To deploy the Astro
# site instead, set: command = "npm run build" and publish = "dist".

[build]
  command = "echo 'static mockup — no build'"
  publish = "Mejora UXUI Donde Ayudar-handoff/mejora-ux-ui-donde-ayudar/project"
