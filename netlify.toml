# Netlify build for Donde Ayudar — Astro site serving the design mockup.
# The mockup lives in public/ (index.html + support.js + content.js + assets/)
# and is served by the Astro build. Security/caching headers in public/_headers.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
