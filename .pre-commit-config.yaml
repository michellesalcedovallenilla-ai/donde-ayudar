# Prevents secrets or personal data from ever being committed.
# Setup (once):  pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret & PII scan)
        entry: gitleaks protect --staged --redact --verbose --config .gitleaks.toml
        language: golang
        pass_filenames: false
