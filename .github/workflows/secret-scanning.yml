name: Secret & PII Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the whole repo is scanned

      - name: Install Gitleaks
        run: |
          VERSION=8.21.2
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${VERSION}_linux_x64.tar.gz"
          chmod +x gitleaks

      - name: Scan repository
        run: ./gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1
